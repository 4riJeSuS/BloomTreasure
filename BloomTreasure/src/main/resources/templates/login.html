<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BloomTreasure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { margin-top: 100px; max-width: 400px; }
        .btn-bloom { background-color: #2d5a27; color: white; } /* Cor verde para combinar com o tema */
        .btn-bloom:hover { background-color: #21441d; color: white; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-container shadow p-4 bg-white rounded">
        <h2 class="text-center mb-4">BloomTreasure</h2>
        <p class="text-muted text-center">Inicie sessão na sua conta</p>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="email" class="form-label">E-mail ou Utilizador</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Palavra-passe</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-bloom">Entrar</button>
            </div>
        </form>

        <div class="mt-3 text-center">
            <small>Não tem conta? <a th:href="@{/signup}">Registe-se aqui</a></small>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
