<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - BloomTreasure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .signup-container { margin-top: 50px; max-width: 500px; margin-bottom: 50px; }
        .btn-bloom { background-color: #2d5a27; color: white; }
        .btn-bloom:hover { background-color: #21441d; color: white; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="signup-container shadow p-4 bg-white rounded">
        <h2 class="text-center mb-4">Criar Conta</h2>
        <p class="text-muted text-center">Junte-se à BloomTreasure</p>

        <form th:action="@{/signup}" method="post">

            <div class="mb-3">
                <label for="name" class="form-label">Nome Completo</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Ex: João Silva" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="joao@exemplo.com" required>
            </div>

            <div class="mb-3">
                <label for="nif" class="form-label">NIF</label>
                <input type="text" id="nif" name="nif" class="form-control" placeholder="Número de Identificação Fiscal" required>
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Morada de Entrega</label>
                <textarea id="address" name="address" class="form-control" rows="2" placeholder="Rua, Número, Andar..." required></textarea>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Palavra-passe</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-bloom">Finalizar Registo</button>
            </div>
        </form>

        <div class="mt-3 text-center">
            <small>Já tem conta? <a th:href="@{/login}">Faça login aqui</a></small>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
