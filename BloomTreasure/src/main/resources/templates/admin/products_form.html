<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Produto - BloomTreasure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm p-4 bg-white rounded">

        <h2 class="mb-4 text-center" th:text="${product.id_prod != null} ? 'Editar Produto' : 'Adicionar Novo Produto'">
            Formulário</h2>

        <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
            <input type="hidden" th:field="*{id_prod}">

            <div class="mb-3">
                <label for="name" class="form-label">Nome do Produto</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" required maxlength="100">
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Descrição</label>
                <textarea id="description" th:field="*{description}" class="form-control" rows="3" required
                          maxlength="200"></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="price" class="form-label">Preço (€)</label>
                    <input type="number" step="0.01" id="price" th:field="*{price}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="stock" class="form-label">Quantidade em Stock</label>
                    <input type="number" id="stock" th:field="*{stock}" class="form-control" required min="0">
                </div>
            </div>

            <div class="mb-3">
                <label for="category" class="form-label">Categoria</label>
                <select id="category" th:field="*{category.id_cat}" class="form-select" required>
                    <option value="" disabled selected>Escolha uma categoria...</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id_cat}"
                            th:text="${cat.name}"></option>
                </select>
            </div>

            <div class="mb-4">
                <label for="imageUrl" class="form-label">Nome da Imagem (ex: jogo.jpg)</label>
                <input type="text" id="imageUrl" th:field="*{imageUrl}" class="form-control" maxlength="255">
            </div>

            <div class="d-flex justify-content-between">
                <a href="/admin/products" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-success">Guardar Produto</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
