<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Produtos - BloomTreasure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">« Voltar ao Dashboard</a>
        <a th:href="@{/admin/products/new}" class="btn btn-success">Add Novo Produto</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Lista de Produtos</h2>

    <div class="table-responsive bg-white shadow-sm p-3 rounded">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Preço</th>
                <th>Stock</th>
                <th>Categoria</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id_prod}">1</td>
                <td th:text="${p.name}">Produto</td>
                <td th:text="${p.price} + '€'">0€</td>
                <td th:text="${p.stock}">0</td>
                <td th:text="${p.category.name}">Categoria</td>
                <td>
                    <a th:href="@{/admin/products/edit/{id}(id=${p.id_prod})}" class="btn btn-sm btn-primary">Editar</a>
                    <a th:href="@{/admin/products/delete/{id}(id=${p.id_prod})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Tem a certeza?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
