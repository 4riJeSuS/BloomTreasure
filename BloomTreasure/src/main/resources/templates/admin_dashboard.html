<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel de Administração - BloomTreasure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-card { transition: 0.3s; cursor: pointer; border-left: 5px solid #1a1a1a; }
        .admin-card:hover { transform: scale(1.02); background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">BloomTreasure ADMIN</a>
        <div class="ms-auto">
            <span class="text-light me-3" th:if="${session.loggedUser != null}"
                  th:text="'Olá, ' + ${session.loggedUser.name}">Admin</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Sair</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Painel de Controlo</h2>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card admin-card shadow-sm p-3" onclick="window.location.href='/admin/products'">
                <div class="card-body">
                    <h5 class="card-title text-dark">📦 Gestão de Produtos</h5>
                    <p class="card-text text-muted">Criar, editar, remover e controlar stocks.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card admin-card shadow-sm p-3" onclick="window.location.href='/admin/categories'">
                <div class="card-body">
                    <h5 class="card-title text-dark">📦 Gestão de Categorias</h5>
                    <p class="card-text text-muted">Criar, editar, remover e controlar stocks.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card admin-card shadow-sm p-3" onclick="window.location.href='/admin/clients'">
                <div class="card-body">
                    <h5 class="card-title text-dark">📦 Gestão de Clientes</h5>
                    <p class="card-text text-muted">Criar, editar, remover e controlar stocks.</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
