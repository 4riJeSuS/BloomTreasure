<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BloomTreasure - A tua Loja de Colecionáveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-custom { background-color: #1a1a1a; }
        .product-card { transition: 0.3s; height: 100%; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .category-link { text-decoration: none; color: #333; }
        .category-link:hover { color: #2d5a27; font-weight: bold; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">BloomTreasure</a>
        <div class="ms-auto">
            <a th:href="@{/login}" class="btn btn-outline-light me-2">Login</a>
            <a th:href="@{/signup}" class="btn btn-warning text-dark fw-bold">Sign Up</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-3">
            <div class="p-3 bg-white rounded shadow-sm">
                <h5 class="border-bottom pb-2">Categorias</h5>
                <ul class="list-unstyled pt-2">
                    <li th:each="cat : ${categories}" class="mb-2">
                        <a th:href="@{/category/{id}(id=${cat.id_cat})}"
                           class="category-link"
                           th:text="${cat.name}">Nome da Categoria</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-md-9">
            <h2 class="mb-4">O Nosso Catálogo</h2>
            <div class="row row-cols-1 row-cols-md-3 g-4">

                <div class="col" th:each="prod : ${products}">
                    <div class="card product-card">
                        <img th:src="@{'/images/' + ${prod.imageUrl}}" class="card-img-top" alt="Imagem do Produto"
                             style="height: 200px; object-fit: cover;"
                             onerror="this.src='https://via.placeholder.com/300x200?text=Sem+Foto'">

                        <div class="card-body">
                            <h5 class="card-title" th:text="${prod.name}">Nome do Jogo</h5>
                            <p class="card-text text-muted small" th:text="${prod.description}">Descrição curta...</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="h5 mb-0" th:text="${prod.price} + '€'">0.00€</span>
                                <a href="#" class="btn btn-sm btn-dark">Ver mais</a>
                            </div>
                        </div>
                        <div class="card-footer bg-transparent border-0 pb-3">
                            <span class="badge bg-info text-dark" th:text="${prod.category.name}">Categoria</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
