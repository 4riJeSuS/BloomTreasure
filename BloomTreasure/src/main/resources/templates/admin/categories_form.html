<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Categoria - BloomTreasure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm p-4 bg-white rounded">

        <h2 class="mb-4 text-center" th:text="${category.id_cat != null} ? 'Editar Categoria' : 'Nova Categoria'">Formulário</h2>

        <form th:action="@{/admin/categories/save}" th:object="${category}" method="post">
            <input type="hidden" th:field="*{id_cat}">

            <div class="mb-3">
                <label for="name" class="form-label">Nome da Categoria</label>
                <input type="text" id="name" th:field="*{name}" class="form-control"
                       placeholder="Ex: RPG, Aventura, Estratégia" required maxlength="50">
            </div>

            <div class="mb-4">
                <label for="description" class="form-label">Descrição da Categoria</label>
                <textarea id="description" th:field="*{description}" class="form-control" rows="3"
                          placeholder="Breve descrição sobre o tipo de produtos desta categoria..."
                          required maxlength="200"></textarea>
                <div class="form-text">Máximo de 200 caracteres.</div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/admin/categories" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-success">Guardar Categoria</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
