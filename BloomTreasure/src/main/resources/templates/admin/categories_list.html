<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Categorias - BloomTreasure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard">« Voltar ao Dashboard</a>
        <a th:href="@{/admin/categories/new}" class="btn btn-success">Add Nova Categoria</a>
    </div>
</nav>

<div class="container" style="max-width: 800px;">
    <h2 class="mb-4">Lista de Categorias</h2>

    <div class="table-responsive bg-white shadow-sm p-3 rounded">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nome da Categoria</th>
                <th class="text-end">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${categories}">
                <td th:text="${c.id_cat}">1</td>
                <td th:text="${c.name}">Nome da Categoria</td>
                <td class="text-end">
                    <a th:href="@{/admin/categories/edit/{id}(id=${c.id_cat})}" class="btn btn-sm btn-primary me-2">Editar</a>
                    <a th:href="@{/admin/categories/delete/{id}(id=${c.id_cat})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Tem a certeza? Se esta categoria tiver produtos associados, poderá dar erro.')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
